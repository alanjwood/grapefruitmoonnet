baseURL = "https://grapefruitmoon.net/"
theme = "nostyleplease"
title = "Grapefruitmoon.net"
author = "Alan Wood"
copyright = "© Alan Wood"
languageCode = "en"
DefaultContentLanguage = "en"

enableInlineShortcodes = true
canonifyurls = true

[pagination]
pagerSize = 10

[params]
noindex = false
mainSections = ["posts"]
goatcounter = "grapefruitmoon"

[params.theme]
palette = "gruvbox-dark"

[params.theme_config]
isShowFooter = true

# Sidebar: about/bio
[params.about]
title = "Grapefruitmoon.net"
description = "Data nerd, musician, herbivore. Where I might talk about data, tech, music, sports and other related nonsense."
logo = "🍊"

# Sidebar: social links
[[params.socialLinks]]
icon = "fa-brands fa-bluesky"
title = "Bluesky"
url = "https://bsky.app/profile/alanwood.me"

[taxonomies]
category = "categories"
tag = "tags"

# For inline HTML in posts
[markup.goldmark.renderer]
unsafe = true

[markup]
# Syntax highlighting
[markup.highlight]
style = "monokai"

# Table of contents
[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = true

[[menu.main]]
identifier = "posts"
name = "Blog"
url = "/posts/"
weight = 1

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 2
